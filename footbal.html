<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Liga dos Amigos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --gold-dark: #D4A900;
    --black: #111111;
    --dark: #1A1A1A;
    --card: #222222;
    --card2: #2A2A2A;
    --border: #333333;
    --text: #F0F0F0;
    --muted: #888888;
    --green: #2ECC71;
    --red: #E74C3C;
    --blue: #3498DB;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 2px solid var(--gold);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--gold);
  }
  header .subtitle { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: -2px; }

  /* BOTTOM NAV */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--dark);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    padding: 10px 4px 12px;
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  nav button .icon { font-size: 1.3rem; }
  nav button.active { color: var(--gold); }
  nav button.active .icon { filter: drop-shadow(0 0 6px var(--gold)); }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  /* INPUTS */
  input, select {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input::placeholder { color: var(--muted); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .btn-gold { background: var(--gold); color: var(--black); }
  .btn-gold:hover { background: var(--gold-dark); }
  .btn-dark { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn-dark:hover { border-color: var(--gold); }
  .btn-red { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
  .btn-red:hover { background: #4a2020; }
  .btn-sm { padding: 6px 10px; font-size: 0.75rem; }
  .btn-full { width: 100%; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--text);
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span { color: var(--gold); }

  /* RANKING TABLE */
  .rank-table { width: 100%; border-collapse: collapse; }
  .rank-table th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 10px;
    font-weight: 500;
  }
  .rank-table th:last-child, .rank-table td:last-child { text-align: right; }
  .rank-table td {
    padding: 10px 8px;
    font-size: 0.9rem;
    border-top: 1px solid var(--border);
  }
  .rank-table tr:first-child td { border-top: none; }
  .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--muted); width: 28px; }
  .rank-pos.top1 { color: #FFD700; }
  .rank-pos.top2 { color: #C0C0C0; }
  .rank-pos.top3 { color: #CD7F32; }
  .rank-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); }
  .rank-name { font-weight: 500; }
  .rank-sub { font-size: 0.72rem; color: var(--muted); }

  /* TEAM DISPLAY */
  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .team-box {
    border-radius: 10px;
    padding: 12px;
    background: var(--card2);
  }
  .team-box.gold { border-top: 3px solid var(--gold); }
  .team-box.black { border-top: 3px solid #555; }
  .team-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .team-label.gold { color: var(--gold); }
  .team-label.black { color: #999; }
  .team-player { font-size: 0.82rem; padding: 3px 0; color: var(--text); display: flex; align-items: center; gap: 5px; }
  .team-player::before { content: '·'; color: var(--muted); }

  /* SCORE DISPLAY */
  .score-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 0;
  }
  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    line-height: 1;
  }
  .score-val.gold { color: var(--gold); }
  .score-val.black { color: #999; }
  .score-sep { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--muted); }
  .score-input-row { display: flex; align-items: center; gap: 10px; }
  .score-num-input { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; padding: 8px; width: 70px; }
  .score-label { font-size: 0.7rem; text-align: center; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-win { background: #1a3a25; color: var(--green); }
  .badge-draw { background: #1a2a3a; color: var(--blue); }
  .badge-loss { background: #3a1a1a; color: var(--red); }
  .badge-pending { background: #2a2a1a; color: #aaa; }

  /* PLAYER SELECTOR */
  .player-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .player-chip {
    padding: 7px 13px;
    border-radius: 100px;
    font-size: 0.82rem;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--card2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .player-chip.selected-gold { border-color: var(--gold); background: #2a2100; color: var(--gold); }
  .player-chip.selected-black { border-color: #666; background: #1e1e1e; color: #ddd; }
  .player-chip:hover:not(.selected-gold):not(.selected-black) { border-color: #555; color: var(--text); }

  /* GAME HISTORY */
  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .game-card-header {
    padding: 10px 14px;
    background: var(--card2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .game-date { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .game-card-body { padding: 12px 14px; }
  .game-score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .game-team-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .game-team-name.gold { color: var(--gold); }
  .game-team-name.black { color: #aaa; }
  .game-team-score { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }

  /* STATS */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 0.82rem; color: var(--muted); }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--text); }
  .stat-bar-wrap { background: var(--border); border-radius: 100px; height: 4px; margin-top: 4px; overflow: hidden; }
  .stat-bar { height: 4px; background: var(--gold); border-radius: 100px; transition: width 0.5s; }

  /* FORM ROW */
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty p { font-size: 0.85rem; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--dark);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-bottom: none;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 16px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: var(--gold); margin-bottom: 16px; }

  /* STEP INDICATOR */
  .steps { display: flex; gap: 6px; margin-bottom: 20px; }
  .step-dot { flex: 1; height: 3px; border-radius: 100px; background: var(--border); transition: background 0.3s; }
  .step-dot.active { background: var(--gold); }

  /* PLAYER EDIT ROW */
  .player-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-child { border-bottom: none; }
  .player-row-name { flex: 1; font-size: 0.9rem; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* UTIL */
  .flex-row { display: flex; gap: 8px; }
  .flex-row > * { flex: 1; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .text-muted { color: var(--muted); font-size: 0.82rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .result-winner { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px; padding: 8px 12px; text-align: center; font-size: 0.8rem; color: var(--green); font-weight: 600; }
  .result-draw { background: #1a1a2a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 8px 12px; text-align: center; font-size: 0.8rem; color: var(--blue); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div>⚽</div>
  <div>
    <h1>Liga dos Amigos</h1>
    <div class="subtitle">Gestão de Jogos</div>
  </div>
</header>

<!-- PAGES -->
<div id="page-ranking" class="page active">
  <div class="section-title">🏆 <span>Ranking</span></div>
  <div id="ranking-content"></div>
</div>

<div id="page-jogos" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="section-title" style="margin-bottom:0">📅 <span>Jogos</span></div>
    <button class="btn btn-gold btn-sm" onclick="openNewGameModal()">+ Novo Jogo</button>
  </div>
  <div id="jogos-content"></div>
</div>

<div id="page-jogadores" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="section-title" style="margin-bottom:0">👤 <span>Jogadores</span></div>
    <button class="btn btn-gold btn-sm" onclick="openAddPlayerModal()">+ Adicionar</button>
  </div>
  <div id="jogadores-content"></div>
</div>

<div id="page-stats" class="page">
  <div class="section-title">📊 <span>Estatísticas</span></div>
  <div id="stats-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav>
  <button class="active" onclick="showPage('ranking',this)">
    <span class="icon">🏆</span>Ranking
  </button>
  <button onclick="showPage('jogos',this)">
    <span class="icon">📅</span>Jogos
  </button>
  <button onclick="showPage('jogadores',this)">
    <span class="icon">👤</span>Jogadores
  </button>
  <button onclick="showPage('stats',this)">
    <span class="icon">📊</span>Stats
  </button>
</nav>

<!-- MODAL: NOVO JOGO -->
<div class="modal-overlay" id="modal-newgame">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="newgame-title">Novo Jogo</div>
    <div class="steps">
      <div class="step-dot active" id="step1-dot"></div>
      <div class="step-dot" id="step2-dot"></div>
    </div>
    <div id="newgame-step1">
      <div class="form-row">
        <label class="form-label">Data do Jogo</label>
        <input type="date" id="game-date">
      </div>
      <div class="flex-row mt-12">
        <button class="btn btn-dark" onclick="closeModal('modal-newgame')">Cancelar</button>
        <button class="btn btn-gold" onclick="goStep(2)">Próximo →</button>
      </div>
    </div>
    <div id="newgame-step2" style="display:none">
      <p class="text-muted" style="margin-bottom:12px;font-size:0.78rem">Toca num jogador para o adicionar a uma equipa. Toca novamente para mudar de equipa ou remover.</p>
      <div class="form-row">
        <label class="form-label">⬡ Equipa Dourada <span id="gold-count" style="color:var(--gold)"></span></label>
        <div class="player-grid" id="gold-chips"></div>
      </div>
      <hr class="divider">
      <div class="form-row">
        <label class="form-label">◼ Equipa Preta <span id="black-count" style="color:#aaa"></span></label>
        <div class="player-grid" id="black-chips"></div>
      </div>
      <div class="flex-row mt-12">
        <button class="btn btn-dark" onclick="goStep(1)">← Voltar</button>
        <button class="btn btn-gold" onclick="saveGame()">💾 Guardar Jogo</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: EDITAR RESULTADO -->
<div class="modal-overlay" id="modal-edit-score">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Editar Resultado</div>
    <input type="hidden" id="edit-game-id">
    <div class="score-input-row" style="justify-content:center;gap:20px;">
      <div style="text-align:center">
        <input type="number" class="score-num-input" id="edit-score-gold" min="0" value="0" style="color:var(--gold)">
        <div class="score-label" style="color:var(--gold)">Dourada</div>
      </div>
      <div style="font-family:'Bebas Neue';font-size:2rem;color:var(--muted);padding-top:4px;">×</div>
      <div style="text-align:center">
        <input type="number" class="score-num-input" id="edit-score-black" min="0" value="0" style="color:#aaa">
        <div class="score-label" style="color:#aaa">Preta</div>
      </div>
    </div>
    <div class="flex-row mt-12">
      <button class="btn btn-dark" onclick="closeModal('modal-edit-score')">Cancelar</button>
      <button class="btn btn-gold" onclick="saveEditedScore()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD PLAYER -->
<div class="modal-overlay" id="modal-addplayer">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Adicionar Jogador</div>
    <div class="form-row">
      <label class="form-label">Nome</label>
      <input type="text" id="new-player-name" placeholder="Nome do jogador..." maxlength="30">
    </div>
    <div class="flex-row mt-12">
      <button class="btn btn-dark" onclick="closeModal('modal-addplayer')">Cancelar</button>
      <button class="btn btn-gold" onclick="savePlayer()">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL: GAME DETAIL -->
<div class="modal-overlay" id="modal-game-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="game-detail-content"></div>
    <button class="btn btn-dark btn-full mt-12" onclick="closeModal('modal-game-detail')">Fechar</button>
  </div>
</div>

<!-- MODAL: CONFIRM -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirm-message" style="font-size:1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-weight:600;margin-bottom:20px"></div>
    <div class="flex-row">
      <button class="btn btn-dark" onclick="closeModal('modal-confirm')">Cancelar</button>
      <button class="btn btn-red" id="confirm-ok-btn">Apagar</button>
    </div>
  </div>
</div>

<!-- MODAL: EDITAR JOGADOR -->
<div class="modal-overlay" id="modal-editplayer">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Editar Jogador</div>
    <input type="hidden" id="edit-player-id">
    <div class="form-row">
      <label class="form-label">Nome</label>
      <input type="text" id="edit-player-name" maxlength="30">
    </div>
    <div class="flex-row mt-12">
      <button class="btn btn-dark" onclick="closeModal('modal-editplayer')">Cancelar</button>
      <button class="btn btn-gold" onclick="saveEditedPlayer()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// DATA LAYER — JSON in localStorage
// ============================================================
const STORAGE_KEY = 'liga_amigos_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { players: [], games: [] };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let db = loadData();

// Export / Import
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'liga_amigos_backup.json';
  a.click();
  showToast('📥 Backup exportado!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed.players && parsed.games) {
        db = parsed;
        saveData(db);
        renderAll();
        showToast('✅ Dados importados com sucesso!');
      }
    } catch(err) { showToast('❌ Ficheiro inválido'); }
  };
  reader.readAsText(file);
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  renderAll();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// MODAL
// ============================================================
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ============================================================
// PLAYERS
// ============================================================
function openAddPlayerModal() {
  document.getElementById('new-player-name').value = '';
  document.getElementById('modal-addplayer').classList.add('open');
  setTimeout(() => document.getElementById('new-player-name').focus(), 200);
}

function savePlayer() {
  const name = document.getElementById('new-player-name').value.trim();
  if (!name) { showToast('⚠️ Insere um nome'); return; }
  if (db.players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    showToast('⚠️ Jogador já existe'); return;
  }
  db.players.push({ id: Date.now().toString(), name });
  saveData(db);
  closeModal('modal-addplayer');
  renderAll();
  showToast('✅ Jogador adicionado!');
}

function deletePlayer(id) {
  showConfirm('Apagar este jogador?', () => {
    db.players = db.players.filter(p => p.id !== id);
    saveData(db);
    renderAll();
    showToast('🗑️ Jogador removido');
  });
}

function editPlayerName(id) {
  const player = db.players.find(p => p.id === id);
  if (!player) return;
  document.getElementById('edit-player-id').value = id;
  document.getElementById('edit-player-name').value = player.name;
  document.getElementById('modal-editplayer').classList.add('open');
  setTimeout(() => document.getElementById('edit-player-name').focus(), 200);
}

function renderPlayers() {
  const el = document.getElementById('jogadores-content');
  if (!el) return;
  if (db.players.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><p>Sem jogadores ainda.<br>Adiciona o primeiro!</p></div>`;
    return;
  }
  const sorted = [...db.players].sort((a,b) => a.name.localeCompare(b.name));
  el.innerHTML = `<div class="card">` +
    sorted.map(p => `
      <div class="player-row">
        <div class="player-row-name">${p.name}</div>
        <button class="btn btn-dark btn-sm" onclick="editPlayerName('${p.id}')">✏️</button>
        <button class="btn btn-red btn-sm" onclick="deletePlayer('${p.id}')">🗑️</button>
      </div>
    `).join('') +
  `</div>
  <div class="card" style="margin-top:12px">
    <div class="card-title">💾 Backup de Dados</div>
    <p class="text-muted" style="margin-bottom:12px">Exporta ou importa os dados em formato JSON para guardar uma cópia.</p>
    <div class="flex-row">
      <button class="btn btn-dark" onclick="exportData()">📤 Exportar JSON</button>
      <label class="btn btn-dark" style="cursor:pointer">📥 Importar JSON<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
  </div>`;
}

// ============================================================
// GAMES
// ============================================================
let newGameData = { date: '', gold: [], black: [] };
let currentStep = 1;

function openNewGameModal() {
  if (db.players.length < 2) { showToast('⚠️ Adiciona pelo menos 2 jogadores'); return; }
  newGameData = { date: '', gold: [], black: [] };
  document.getElementById('game-date').value = new Date().toISOString().split('T')[0];
  currentStep = 1;
  goStep(1);
  document.getElementById('modal-newgame').classList.add('open');
  document.getElementById('newgame-title').textContent = 'Novo Jogo';
}

function goStep(step) {
  [1,2].forEach(s => {
    document.getElementById('newgame-step'+s).style.display = s === step ? 'block' : 'none';
    document.getElementById('step'+s+'-dot').classList.toggle('active', s <= step);
  });
  currentStep = step;
  if (step === 2) renderPlayerChips();
}

function renderPlayerChips() {
  const sorted = [...db.players].sort((a,b) => a.name.localeCompare(b.name));
  const goldCount = newGameData.gold.length;
  const blackCount = newGameData.black.length;
  document.getElementById('gold-count').textContent = goldCount > 0 ? `(${goldCount})` : '';
  document.getElementById('black-count').textContent = blackCount > 0 ? `(${blackCount})` : '';

  // Single unified chip list - tap cycles: none → gold → black → none
  const makeChip = (p) => {
    const inGold = newGameData.gold.includes(p.id);
    const inBlack = newGameData.black.includes(p.id);
    const cls = inGold ? 'selected-gold' : inBlack ? 'selected-black' : '';
    const label = inGold ? `⬡ ${p.name}` : inBlack ? `◼ ${p.name}` : p.name;
    return `<div class="player-chip ${cls}" onclick="toggleChip('${p.id}')">${label}</div>`;
  };

  // Show all players in gold section for assignment
  document.getElementById('gold-chips').innerHTML = sorted.map(makeChip).join('');

  // Black chips section shows only assigned players (for visual confirmation)
  const blackPlayers = sorted.filter(p => newGameData.black.includes(p.id));
  document.getElementById('black-chips').innerHTML = blackPlayers.length > 0
    ? blackPlayers.map(p => `<div class="player-chip selected-black">◼ ${p.name}</div>`).join('')
    : `<span class="text-muted" style="font-size:0.8rem">Toca nos jogadores acima para os adicionar</span>`;
}

function toggleChip(playerId) {
  const inGold = newGameData.gold.includes(playerId);
  const inBlack = newGameData.black.includes(playerId);
  if (!inGold && !inBlack) {
    // not assigned → assign to gold
    newGameData.gold.push(playerId);
  } else if (inGold) {
    // in gold → move to black
    newGameData.gold = newGameData.gold.filter(id => id !== playerId);
    newGameData.black.push(playerId);
  } else {
    // in black → remove
    newGameData.black = newGameData.black.filter(id => id !== playerId);
  }
  renderPlayerChips();
}

function saveGame() {
  const date = document.getElementById('game-date').value;
  if (!date) { showToast('⚠️ Seleciona uma data'); return; }
  if (newGameData.gold.length === 0 || newGameData.black.length === 0) {
    showToast('⚠️ Cada equipa precisa de pelo menos 1 jogador'); return;
  }
  const game = {
    id: Date.now().toString(),
    date,
    gold: [...newGameData.gold],
    black: [...newGameData.black],
    scoreGold: null,
    scoreBlack: null
  };
  db.games.push(game);
  saveData(db);
  closeModal('modal-newgame');
  renderAll();
  showToast('✅ Jogo criado! Regista o resultado depois do jogo.');
}

function deleteGame(id) {
  showConfirm('Apagar este jogo?', () => {
    db.games = db.games.filter(g => g.id !== id);
    saveData(db);
    renderAll();
    showToast('🗑️ Jogo removido');
  });
}

function openEditScore(id) {
  const game = db.games.find(g => g.id === id);
  if (!game) return;
  document.getElementById('edit-game-id').value = id;
  document.getElementById('edit-score-gold').value = game.scoreGold ?? 0;
  document.getElementById('edit-score-black').value = game.scoreBlack ?? 0;
  document.getElementById('modal-edit-score').classList.add('open');
}

function saveEditedScore() {
  const id = document.getElementById('edit-game-id').value;
  const game = db.games.find(g => g.id === id);
  if (!game) return;
  game.scoreGold = parseInt(document.getElementById('edit-score-gold').value) || 0;
  game.scoreBlack = parseInt(document.getElementById('edit-score-black').value) || 0;
  saveData(db);
  closeModal('modal-edit-score');
  renderAll();
  showToast('✅ Resultado registado!');
}

function openGameDetail(id) {
  const game = db.games.find(g => g.id === id);
  if (!game) return;
  const getNames = (ids) => ids.map(id => {
    const p = db.players.find(p => p.id === id);
    return p ? p.name : '?';
  });
  const winner = getWinner(game);
  const goldNames = getNames(game.gold);
  const blackNames = getNames(game.black);

  const scoreSection = winner === 'pending'
    ? `<div style="text-align:center;padding:16px 0">
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">Resultado ainda não registado</div>
        <button class="btn btn-gold" onclick="closeModal('modal-game-detail');openEditScore('${game.id}')">+ Registar Resultado</button>
       </div>`
    : `<div class="score-display">
        <div style="text-align:center">
          <div class="score-val gold">${game.scoreGold}</div>
          <div class="score-label" style="color:var(--gold)">Dourada</div>
        </div>
        <div class="score-sep">×</div>
        <div style="text-align:center">
          <div class="score-val black">${game.scoreBlack}</div>
          <div class="score-label" style="color:#aaa">Preta</div>
        </div>
      </div>
      <div style="margin:10px 0">${
        winner === 'draw'
          ? `<div class="result-draw">🤝 Empate</div>`
          : `<div class="result-winner">🏆 Venceu a Equipa ${winner === 'gold' ? 'Dourada' : 'Preta'}</div>`
      }</div>`;

  const editBtn = winner !== 'pending'
    ? `<button class="btn btn-dark" onclick="closeModal('modal-game-detail');openEditScore('${game.id}')">✏️ Editar Resultado</button>` : '';

  document.getElementById('game-detail-content').innerHTML = `
    <div class="modal-title">${formatDate(game.date)}</div>
    ${scoreSection}
    <div class="teams-grid" style="margin-top:14px">
      <div class="team-box gold">
        <div class="team-label gold">⬡ Dourada</div>
        ${goldNames.map(n => `<div class="team-player">${n}</div>`).join('')}
      </div>
      <div class="team-box black">
        <div class="team-label black">◼ Preta</div>
        ${blackNames.map(n => `<div class="team-player">${n}</div>`).join('')}
      </div>
    </div>
    <div class="flex-row" style="margin-top:14px">
      ${editBtn}
      <button class="btn btn-red" onclick="closeModal('modal-game-detail');deleteGame('${game.id}')">🗑️ Apagar</button>
    </div>
  `;
  document.getElementById('modal-game-detail').classList.add('open');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const [y,m,d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function getWinner(game) {
  if (game.scoreGold === null || game.scoreBlack === null) return 'pending';
  if (game.scoreGold > game.scoreBlack) return 'gold';
  if (game.scoreBlack > game.scoreGold) return 'black';
  return 'draw';
}

function renderGames() {
  const el = document.getElementById('jogos-content');
  if (!el) return;
  if (db.games.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>Nenhum jogo ainda.<br>Cria o primeiro!</p></div>`;
    return;
  }
  const sorted = [...db.games].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(game => {
    const winner = getWinner(game);
    const badge = winner === 'pending'
      ? `<span class="badge badge-pending">⏳ Por jogar</span>`
      : winner === 'gold'
      ? `<span class="badge badge-win">🏆 Dourada</span>`
      : winner === 'black'
      ? `<span class="badge badge-win">🏆 Preta</span>`
      : `<span class="badge badge-draw">🤝 Empate</span>`;
    const scoreHtml = winner === 'pending'
      ? `<button class="btn btn-gold btn-sm" onclick="event.stopPropagation();openEditScore('${game.id}')">+ Registar Resultado</button>`
      : `<span class="game-team-score" style="color:var(--gold)">${game.scoreGold}</span>
         <span style="font-family:'Bebas Neue';color:var(--muted);font-size:1.2rem;padding:0 8px">×</span>
         <span class="game-team-score" style="color:#aaa">${game.scoreBlack}</span>`;
    return `
      <div class="game-card" onclick="openGameDetail('${game.id}')">
        <div class="game-card-header">
          <span class="game-date">📅 ${formatDate(game.date)}</span>
          ${badge}
        </div>
        <div class="game-card-body">
          <div class="game-score-row">
            <span class="game-team-name gold">⬡ Dourada</span>
            ${scoreHtml}
            <span class="game-team-name black" style="text-align:right">Preta ◼</span>
          </div>
          ${winner !== 'pending' ? `<div style="font-size:0.72rem;color:var(--muted)">Toca para ver detalhes</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// STATS / POINTS
// ============================================================
function computeStats() {
  const stats = {};
  db.players.forEach(p => {
    stats[p.id] = { id: p.id, name: p.name, games: 0, wins: 0, draws: 0, losses: 0, points: 0 };
  });
  db.games.forEach(game => {
    if (game.scoreGold === null || game.scoreBlack === null) return; // skip pending
    const winner = getWinner(game);
    [...game.gold, ...game.black].forEach(pid => {
      if (!stats[pid]) return;
      stats[pid].games++;
      if (winner === 'draw') { stats[pid].draws++; stats[pid].points++; }
      else if ((winner === 'gold' && game.gold.includes(pid)) || (winner === 'black' && game.black.includes(pid))) {
        stats[pid].wins++; stats[pid].points += 3;
      } else { stats[pid].losses++; }
    });
  });
  return Object.values(stats);
}

function renderRanking() {
  const el = document.getElementById('ranking-content');
  if (!el) return;
  const stats = computeStats().filter(s => s.games > 0);
  if (stats.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🏆</div><p>Nenhum jogo registado ainda.</p></div>
    <div class="card" style="margin-top:12px">
      <p class="text-muted" style="text-align:center">Começa por adicionar jogadores e criar um jogo! 🎮</p>
    </div>`;
    return;
  }
  stats.sort((a,b) => b.points - a.points || b.wins - a.wins || a.losses - b.losses || a.name.localeCompare(b.name));
  const posClass = (i) => i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
  const posIcon = (i) => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}`;
  el.innerHTML = `<div class="card">
    <table class="rank-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Jogador</th>
          <th style="text-align:center">J</th>
          <th style="text-align:center">V</th>
          <th>Pts</th>
        </tr>
      </thead>
      <tbody>
        ${stats.map((s,i) => `
          <tr>
            <td class="rank-pos ${posClass(i)}">${posIcon(i)}</td>
            <td class="rank-name">${s.name}<div class="rank-sub">${s.wins}V ${s.draws}E ${s.losses}D</div></td>
            <td style="text-align:center;color:var(--muted);font-size:0.85rem">${s.games}</td>
            <td style="text-align:center;color:var(--green);font-size:0.85rem">${s.wins}</td>
            <td class="rank-pts">${s.points}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderStats() {
  const el = document.getElementById('stats-content');
  if (!el) return;
  const stats = computeStats().filter(s => s.games > 0);
  if (stats.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><p>Sem dados ainda.</p></div>`;
    return;
  }
  stats.sort((a,b) => b.points - a.points);
  el.innerHTML = stats.map(s => {
    const winPct = s.games > 0 ? Math.round((s.wins / s.games) * 100) : 0;
    return `
    <div class="card">
      <div class="card-title">${s.name}</div>
      <div class="stat-row">
        <span class="stat-label">Jogos</span>
        <span class="stat-value">${s.games}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Vitórias</span>
        <span class="stat-value" style="color:var(--green)">${s.wins}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Empates</span>
        <span class="stat-value" style="color:var(--blue)">${s.draws}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Derrotas</span>
        <span class="stat-value" style="color:var(--red)">${s.losses}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Pontos totais</span>
        <span class="stat-value" style="color:var(--gold)">${s.points}</span>
      </div>
      <div class="stat-row" style="border-bottom:none;flex-direction:column;align-items:flex-start">
        <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:6px">
          <span class="stat-label">Taxa de vitória</span>
          <span class="stat-value">${winPct}%</span>
        </div>
        <div class="stat-bar-wrap" style="width:100%">
          <div class="stat-bar" style="width:${winPct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderRanking();
  renderGames();
  renderPlayers();
  renderStats();
}

// Init
renderAll();

// Enter key on player name
document.getElementById('new-player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePlayer();
});
document.getElementById('edit-player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveEditedPlayer();
});

let confirmCallback = null;
function showConfirm(message, onOk) {
  document.getElementById('confirm-message').textContent = message;
  confirmCallback = onOk;
  document.getElementById('modal-confirm').classList.add('open');
}
document.getElementById('confirm-ok-btn').addEventListener('click', () => {
  closeModal('modal-confirm');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});

function saveEditedPlayer() {
  const id = document.getElementById('edit-player-id').value;
  const name = document.getElementById('edit-player-name').value.trim();
  if (!name) { showToast('⚠️ Insere um nome'); return; }
  const player = db.players.find(p => p.id === id);
  if (!player) return;
  player.name = name;
  saveData(db);
  closeModal('modal-editplayer');
  renderAll();
  showToast('✅ Nome atualizado');
}
</script>
